<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilla F – Interactive Toy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #f472b6;
      --pink2:   #ec4899;
      --dark:    #0f0a1e;
      --darker:  #070410;
      --purple:  #7c3aed;
      --yellow:  #fbbf24;
      --white:   #ffffff;
      --bubble-bg: #fffbe6;
      --font-main: 'Baloo 2', cursive;
      --font-body: 'Nunito', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--darker);
      font-family: var(--font-body);
      color: var(--white);
    }

    /* ── Background blobs ─────────────────────────── */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .b1 { width: 500px; height: 500px; background: var(--purple); top: -120px; left: -100px; animation: drift 12s ease-in-out infinite; }
    .b2 { width: 400px; height: 400px; background: var(--pink);   bottom: -80px; right: -60px; animation: drift 15s ease-in-out infinite reverse; }
    .b3 { width: 300px; height: 300px; background: var(--yellow); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: drift 10s ease-in-out infinite 3s; }

    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(30px,-20px) scale(1.05); }
      66%      { transform: translate(-20px,25px) scale(0.95); }
    }

    /* ── Header ───────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: rgba(15,10,30,0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(244,114,182,0.15);
    }
    .logo {
      font-family: var(--font-main);
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--pink), var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
    }

    /* ── Canvas wrapper ───────────────────────────── */
    #canvas-wrapper {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 90px;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Character Image ─────────────────────────── */
    #character-stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Glow ring behind character */
    #char-glow {
      position: absolute;
      width: min(320px, 70vw);
      height: min(320px, 70vw);
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(244,114,182,0.22) 0%,
        rgba(124,58,237,0.12) 55%,
        transparent 72%);
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      filter: blur(10px);
      pointer-events: none;
      animation: glowPulse 3s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes glowPulse {
      0%,100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
      50%      { opacity: 1;   transform: translateX(-50%) scale(1.08); }
    }

    /* Shadow on ground */
    #char-shadow {
      position: absolute;
      bottom: 6%;
      left: 50%;
      transform: translateX(-50%);
      width: min(180px, 40vw);
      height: 28px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.45) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(6px);
      pointer-events: none;
      z-index: 1;
      animation: shadowBreath 3.5s ease-in-out infinite;
    }
    @keyframes shadowBreath {
      0%,100% { transform: translateX(-50%) scaleX(1); opacity: 0.45; }
      50%      { transform: translateX(-50%) scaleX(1.07); opacity: 0.35; }
    }

    #pilla-img {
      position: relative;
      z-index: 2;
      height: min(82%, 580px);
      max-height: calc(100vh - 180px);
      width: auto;
      object-fit: contain;
      transform-origin: bottom center;
      animation: idleBreath 3.5s ease-in-out infinite;
      filter: drop-shadow(0 12px 36px rgba(0,0,0,0.55)) drop-shadow(0 0 18px rgba(244,114,182,0.18));
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
    }

    @keyframes idleBreath {
      0%,100% { transform: scaleY(1) scaleX(1) translateY(0px); }
      45%      { transform: scaleY(1.012) scaleX(0.997) translateY(-3px); }
      90%      { transform: scaleY(0.994) scaleX(1.003) translateY(2px); }
    }

    /* ── Hit zones overlaid ───────────────────────── */
    #hit-zones {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 10;
    }
    .hit-zone {
      position: absolute;
      cursor: pointer;
      pointer-events: all;
      border-radius: 50%;
      transition: background 0.15s;
    }
    .hit-zone:hover  { background: rgba(244,114,182,0.08); }
    .hit-zone:active { background: rgba(244,114,182,0.22); }

    #zone-head  { top: 2%;  left: 30%; width: 40%; height: 26%; border-radius: 50% 50% 40% 40%; }
    #zone-mouth { top: 20%; left: 34%; width: 32%; height: 8%;  border-radius: 40%; }
    #zone-torso { top: 32%; left: 22%; width: 56%; height: 30%; border-radius: 20px; }
    #zone-legs  { top: 62%; left: 24%; width: 52%; height: 36%; border-radius: 12px; }

    /* ── Speech bubble ────────────────────────────── */
    #speech-bubble {
      position: absolute;
      top: 3%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bubble-bg);
      color: #1a1a2e;
      font-family: var(--font-main);
      font-size: 1.1rem;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 3px var(--pink);
      max-width: 280px;
      text-align: center;
      z-index: 200;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    #speech-bubble.hidden { display: none; }
    .bubble-tail {
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 18px solid var(--bubble-bg);
      filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateX(-50%) scale(0.6); }
      to   { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    /* ── Emoji layer ──────────────────────────────── */
    #emoji-layer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 150;
    }
    .floating-emoji {
      position: absolute;
      font-size: 2rem;
      animation: floatUp 1.2s ease-out forwards;
      pointer-events: none;
      user-select: none;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.4) rotate(20deg); }
    }

    /* ── Controls ─────────────────────────────────── */
    #controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 14px 20px;
      background: rgba(15,10,30,0.75);
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(244,114,182,0.15);
    }
    .ctrl-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: var(--font-main);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      transition: transform 0.12s, box-shadow 0.12s;
      user-select: none;
    }
    .ctrl-btn:active { transform: scale(0.93); }
    .mic-btn {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124,58,237,0.5);
    }
    .mic-btn:hover { box-shadow: 0 6px 28px rgba(124,58,237,0.7); transform: translateY(-1px); }
    .mic-btn.recording {
      background: linear-gradient(135deg, #dc2626, #ef4444);
      box-shadow: 0 4px 20px rgba(220,38,38,0.6);
      animation: pulseBtn 0.8s ease-in-out infinite alternate;
    }
    @keyframes pulseBtn {
      from { box-shadow: 0 4px 20px rgba(220,38,38,0.4); }
      to   { box-shadow: 0 4px 36px rgba(220,38,38,0.9); }
    }
    .pagal-btn {
      background: linear-gradient(135deg, var(--pink2), var(--yellow));
      color: #1a1a2e;
      box-shadow: 0 4px 20px rgba(236,72,153,0.4);
    }
    .pagal-btn:hover { box-shadow: 0 6px 28px rgba(236,72,153,0.7); transform: translateY(-1px); }
    .btn-icon  { font-size: 1.2rem; }
    .btn-label { font-size: 0.9rem; }

    /* ── Hint bar ─────────────────────────────────── */
    #hint-bar {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99;
      display: flex;
      gap: 12px;
      background: rgba(15,10,30,0.6);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 7px 18px;
      border: 1px solid rgba(244,114,182,0.12);
    }
    #hint-bar span {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
    }

    /* ── Mic status ───────────────────────────────── */
    #mic-status {
      position: fixed;
      top: 76px; left: 50%; transform: translateX(-50%);
      z-index: 200;
      background: rgba(220,38,38,0.85);
      color: #fff;
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 700;
      display: flex; align-items: center; gap: 10px;
      backdrop-filter: blur(8px);
    }
    #mic-status.hidden { display: none; }
    .pulse-ring {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 0.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.4); opacity: 0.5; }
    }

    /* ── Character animations ─────────────────────── */
    .shake-wrapper {
      animation: shakeCanvas 0.4s ease-in-out !important;
    }
    @keyframes shakeCanvas {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px) rotate(-2deg); }
      40%     { transform: translateX(8px) rotate(2deg); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }

    /* Image-based animations applied directly on pilla-img */
    .anim-headBounce { animation: headBounce 0.65s ease-out forwards !important; }
    @keyframes headBounce {
      0%   { transform: translateY(0) scaleY(1); }
      20%  { transform: translateY(-18px) scaleY(1.04); }
      42%  { transform: translateY(-8px) scaleY(1.02); }
      60%  { transform: translateY(-14px) scaleY(1.03); }
      78%  { transform: translateY(-4px) scaleY(1.01); }
      100% { transform: translateY(0) scaleY(1); }
    }

    .anim-headShake { animation: headShake 0.8s ease-out forwards !important; }
    @keyframes headShake {
      0%   { transform: rotate(0deg); }
      15%  { transform: rotate(-6deg) translateX(-6px); }
      30%  { transform: rotate(6deg) translateX(6px); }
      45%  { transform: rotate(-5deg) translateX(-4px); }
      60%  { transform: rotate(5deg) translateX(4px); }
      75%  { transform: rotate(-2deg) translateX(-2px); }
      100% { transform: rotate(0deg); }
    }

    .anim-torsoHurt { animation: torsoHurt 1.0s ease-out forwards !important; }
    @keyframes torsoHurt {
      0%   { transform: scale(1) rotate(0deg); }
      12%  { transform: scale(1.06, 0.94) rotate(-3deg); }
      24%  { transform: scale(0.94, 1.06) rotate(3deg); }
      36%  { transform: scale(1.04, 0.96) rotate(-2deg); }
      48%  { transform: scale(0.97, 1.03) rotate(2deg); }
      62%  { transform: scale(1.02, 0.98) rotate(-1deg); }
      78%  { transform: scale(0.99, 1.01) rotate(1deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .anim-legBark { animation: legBark 1.7s ease-out forwards !important; }
    @keyframes legBark {
      0%   { transform: translateY(0) rotate(0deg); }
      8%   { transform: translateY(-22px) rotate(-4deg); }
      16%  { transform: translateY(-10px) rotate(4deg); }
      24%  { transform: translateY(-18px) rotate(-3deg); }
      32%  { transform: translateY(-6px) rotate(3deg); }
      40%  { transform: translateY(-14px) rotate(-2deg); }
      48%  { transform: translateY(-4px) rotate(2deg); }
      56%  { transform: translateY(-10px) rotate(-1deg); }
      64%  { transform: translateY(-2px) rotate(1deg); }
      78%  { transform: translateY(-6px) rotate(0deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    .anim-pagal { animation: pagalChaos 2.6s ease-in-out forwards !important; }
    @keyframes pagalChaos {
      0%   { transform: rotate(0deg) scale(1); }
      7%   { transform: rotate(-12deg) scale(1.04) translateX(-8px); }
      14%  { transform: rotate(14deg) scale(0.96) translateX(8px); }
      21%  { transform: rotate(-10deg) scale(1.05) translateX(-6px); }
      28%  { transform: rotate(11deg) scale(0.97) translateX(6px); }
      35%  { transform: rotate(-9deg) scale(1.04) translateY(-12px); }
      42%  { transform: rotate(9deg) scale(0.96) translateY(8px); }
      50%  { transform: rotate(-7deg) scale(1.03) translateX(-5px) translateY(-8px); }
      58%  { transform: rotate(7deg) scale(0.98) translateX(5px) translateY(6px); }
      65%  { transform: rotate(-5deg) scale(1.02) translateX(-3px); }
      72%  { transform: rotate(5deg) scale(0.99) translateX(3px); }
      82%  { transform: rotate(-2deg) scale(1.01); }
      92%  { transform: rotate(2deg) scale(0.995); }
      100% { transform: rotate(0deg) scale(1); }
    }

    .anim-eatBanana { animation: eatBanana 2.1s ease-out forwards !important; }
    @keyframes eatBanana {
      0%   { transform: translateY(0) rotate(0deg); }
      15%  { transform: translateY(-5px) rotate(-2deg); }
      28%  { transform: translateY(-9px) rotate(2deg); }
      38%  { transform: translateY(-6px) rotate(-2.5deg); }
      50%  { transform: translateY(-8px) rotate(2.5deg); }
      62%  { transform: translateY(-5px) rotate(-1.5deg); }
      74%  { transform: translateY(-6px) rotate(1.5deg); }
      86%  { transform: translateY(-3px) rotate(-1deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    /* Banana emoji popup overlay */
    #banana-overlay {
      position: absolute;
      z-index: 50;
      font-size: 3.5rem;
      left: 54%;
      top: 22%;
      pointer-events: none;
      animation: none;
      opacity: 0;
      transform: scale(0);
    }
    #banana-overlay.show {
      animation: bananaPopIn 2.1s ease-out forwards;
    }
    @keyframes bananaPopIn {
      0%   { opacity: 0; transform: scale(0) rotate(-20deg); }
      12%  { opacity: 1; transform: scale(1.2) rotate(8deg); }
      20%  { transform: scale(0.9) rotate(-5deg); }
      28%  { transform: scale(1.1) rotate(6deg); }
      62%  { opacity: 1; transform: scale(0.85) rotate(-4deg); }
      90%  { opacity: 0.4; transform: scale(0.4) rotate(10deg); }
      100% { opacity: 0; transform: scale(0) rotate(15deg); }
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 480px) {
      .btn-label { display: none; }
      .ctrl-btn { padding: 12px 18px; }
      #hint-bar { gap: 8px; padding: 6px 12px; }
      #hint-bar span { font-size: 0.65rem; }
      #speech-bubble { font-size: 0.95rem; max-width: 220px; }
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>
  <div class="bg-blob b3"></div>

  <!-- Header -->
  <header>
    <div class="logo">🐾 Pilla F</div>
    <div class="subtitle">Tap the character to play!</div>
  </header>

  <!-- Main Canvas Area -->
  <div id="canvas-wrapper">
    <div id="character-stage">

      <!-- Glow + shadow -->
      <div id="char-glow"></div>
      <div id="char-shadow"></div>

      <!-- THE CHARACTER IMAGE -->
      <img id="pilla-img" src="pilla_f.png" alt="Pilla F Character" draggable="false" />

      <!-- Banana overlay emoji -->
      <div id="banana-overlay">🍌</div>

      <!-- Hit zones overlaid -->
      <div id="hit-zones">
        <div class="hit-zone" id="zone-head"  data-part="head"  title="Tap Head"></div>
        <div class="hit-zone" id="zone-mouth" data-part="mouth" title="Tap Mouth"></div>
        <div class="hit-zone" id="zone-torso" data-part="torso" title="Tap Body"></div>
        <div class="hit-zone" id="zone-legs"  data-part="legs"  title="Tap Legs"></div>
      </div>

      <!-- Floating emoji reactions -->
      <div id="emoji-layer"></div>

      <!-- Speech bubble -->
      <div id="speech-bubble" class="hidden">
        <span id="bubble-text"></span>
        <div class="bubble-tail"></div>
      </div>

    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button id="btn-mic" class="ctrl-btn mic-btn" title="Record Voice">
      <span class="btn-icon">🎙️</span>
      <span class="btn-label">Talk to me!</span>
    </button>
    <button id="btn-pagal" class="ctrl-btn pagal-btn" title="Secret line">
      <span class="btn-icon">🤪</span>
      <span class="btn-label">Pagal Mode</span>
    </button>
  </div>

  <!-- Interaction hints -->
  <div id="hint-bar">
    <span>👆 Head</span>
    <span>👄 Mouth</span>
    <span>💥 Belly</span>
    <span>🐾 Legs</span>
  </div>

  <!-- Status indicator -->
  <div id="mic-status" class="hidden">
    <div class="pulse-ring"></div>
    <span>🔴 Recording… tap again to replay</span>
  </div>

  <script>
  'use strict';

  // ─── SPEAK WRAPPER ─────────────────────────────────────────
  function safeSpeak(text, lang) {
    lang = lang || 'hi-IN';
    if (!window.speechSynthesis) return;
    var doSpeak = function() {
      window.speechSynthesis.cancel();
      var utter   = new SpeechSynthesisUtterance(text);
      utter.lang  = lang;
      utter.rate  = 0.88;
      utter.pitch = 0.8;
      utter.volume = 1;
      var voices = window.speechSynthesis.getVoices();
      var pick   = voices.find(function(v){ return v.lang.startsWith('hi'); }) ||
                   voices.find(function(v){ return v.lang.startsWith('en-IN'); }) ||
                   voices[0] || null;
      if (pick) utter.voice = pick;
      window.speechSynthesis.speak(utter);
    };
    var voices = window.speechSynthesis.getVoices();
    if (voices.length) {
      doSpeak();
    } else {
      window.speechSynthesis.onvoiceschanged = function() {
        window.speechSynthesis.onvoiceschanged = null;
        doSpeak();
      };
      setTimeout(doSpeak, 1500);
    }
  }

  // ─── AUDIO: BARK ───────────────────────────────────────────
  function doBark() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.30, 0.60].forEach(function(t) {
        var osc  = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(380, ctx.currentTime + t);
        osc.frequency.exponentialRampToValueAtTime(75, ctx.currentTime + t + 0.20);
        gain.gain.setValueAtTime(0.7, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.24);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.26);
      });
    } catch(e) {}
  }

  // ─── AUDIO: CHOMP ──────────────────────────────────────────
  function doChomp() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.18, 0.36].forEach(function(t) {
        var osc  = ctx.createOscillator();
        var gain = ctx.createGain();
        var filt = ctx.createBiquadFilter();
        filt.type = 'bandpass'; filt.frequency.value = 700;
        osc.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.setValueAtTime(260, ctx.currentTime + t);
        osc.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + t + 0.13);
        gain.gain.setValueAtTime(0.35, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.17);
      });
    } catch(e) {}
  }

  // ─── EMOJI SPAWNER ─────────────────────────────────────────
  function fireEmoji(emoji, x, y) {
    var layer = document.getElementById('emoji-layer');
    if (!layer) return;
    var el = document.createElement('div');
    el.className   = 'floating-emoji';
    el.textContent = emoji;
    // Convert absolute coords to relative inside canvas-wrapper
    var rect = layer.getBoundingClientRect();
    el.style.left = (x - rect.left - 16 + Math.random() * 24) + 'px';
    el.style.top  = (y - rect.top  - 16) + 'px';
    layer.appendChild(el);
    el.addEventListener('animationend', function(){ el.remove(); });
  }

  // ─── SPEECH BUBBLE ─────────────────────────────────────────
  function bubble(text, ms) {
    ms = ms || 2800;
    var el  = document.getElementById('speech-bubble');
    var txt = document.getElementById('bubble-text');
    if (!el || !txt) return;
    el.classList.remove('hidden');
    // Re-trigger animation
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = '';
    txt.textContent = text;
    clearTimeout(window.__bubTimer);
    window.__bubTimer = setTimeout(function(){ el.classList.add('hidden'); }, ms);
  }

  // ─── SHAKE WRAPPER ─────────────────────────────────────────
  function shakeIt() {
    var img = document.getElementById('pilla-img');
    if (!img) return;
    // Remove then re-add shake class (won't conflict — shake is on wrapper class)
    var w = document.getElementById('canvas-wrapper');
    w.classList.remove('shake-wrapper');
    void w.offsetWidth;
    w.classList.add('shake-wrapper');
    w.addEventListener('animationend', function(){ w.classList.remove('shake-wrapper'); }, { once: true });
  }

  // ─── PLAY CHARACTER ANIMATION ─────────────────────────────
  var currentAnim = null;
  var animTimer   = null;

  function playAnim(name) {
    var img = document.getElementById('pilla-img');
    var bov = document.getElementById('banana-overlay');
    if (!img) return;

    // Clear existing
    ['anim-headBounce','anim-headShake','anim-torsoHurt',
     'anim-legBark','anim-pagal','anim-eatBanana'].forEach(function(c){
      img.classList.remove(c);
    });
    img.style.animation = '';
    void img.offsetWidth; // reflow

    var durations = {
      headBounce: 650,
      headShake:  800,
      torsoHurt:  1000,
      legBark:    1700,
      pagal:      2600,
      eatBanana:  2100,
    };

    img.classList.add('anim-' + name);
    clearTimeout(animTimer);
    animTimer = setTimeout(function(){
      img.classList.remove('anim-' + name);
      img.style.animation = '';
    }, durations[name] || 1000);

    // Banana visual
    if (name === 'eatBanana' && bov) {
      bov.classList.remove('show');
      void bov.offsetWidth;
      bov.classList.add('show');
      setTimeout(function(){ bov.classList.remove('show'); }, 2100);
    }
  }

  // ─── INTERACTION HANDLERS ──────────────────────────────────
  var interactCount = 0;

  function getX(e) { return (e.clientX) || (e.touches && e.touches[0] ? e.touches[0].clientX : window.innerWidth / 2); }
  function getY(e) { return (e.clientY) || (e.touches && e.touches[0] ? e.touches[0].clientY : window.innerHeight / 2); }

  function onHead(e) {
    interactCount++;
    bubble('🍌 Kela dona papa, muh me lena h!', 2800);
    safeSpeak('kela dona papa, muh me lena h');
    playAnim('headBounce');
    fireEmoji('🍌', getX(e), getY(e));
    fireEmoji('😋', getX(e) - 28, getY(e) + 18);
    checkPagal();
  }

  function onMouth(e) {
    interactCount++;
    bubble('🍌 Mmm… yummy banana!', 2800);
    safeSpeak('Yummy yummy', 'en-IN');
    doChomp();
    playAnim('eatBanana');
    fireEmoji('🍌', getX(e), getY(e));
    fireEmoji('😋', getX(e) + 24, getY(e) - 18);
    checkPagal();
  }

  function onTorso(e) {
    interactCount++;
    bubble('Papa, dard ho raha hai! 😫', 2800);
    safeSpeak('Papa dard ho raha hai');
    playAnim('torsoHurt');
    shakeIt();
    fireEmoji('💥', getX(e), getY(e));
    fireEmoji('😫', getX(e) - 24, getY(e) - 28);
    checkPagal();
  }

  function onLegs(e) {
    interactCount++;
    bubble('Bhow Bhow Bhow! 🐕', 2400);
    safeSpeak('Bhow bhow bhow');
    doBark();
    playAnim('legBark');
    fireEmoji('🐕', getX(e), getY(e));
    fireEmoji('🦴', getX(e) + 28, getY(e) - 8);
    checkPagal();
  }

  function checkPagal() {
    if (interactCount >= 5) {
      interactCount = 0;
      setTimeout(triggerPagal, 500);
    }
  }

  function triggerPagal() {
    bubble('Main toh pagal kutta hoon! 🤪🐕', 3800);
    safeSpeak('Main toh pagal kutta hoon');
    doBark();
    playAnim('pagal');
    var emojis = ['🤪','🐕','⭐','💥','🍌','😂','🦴','🎉'];
    for (var i = 0; i < 10; i++) {
      (function(idx){
        setTimeout(function(){
          fireEmoji(
            emojis[Math.floor(Math.random() * emojis.length)],
            80 + Math.random() * (window.innerWidth - 160),
            80 + Math.random() * 320
          );
        }, idx * 130);
      })(i);
    }
  }

  // Bind zones
  var zoneMap = {
    'zone-head':  onHead,
    'zone-mouth': onMouth,
    'zone-torso': onTorso,
    'zone-legs':  onLegs,
  };

  Object.keys(zoneMap).forEach(function(id){
    var el = document.getElementById(id);
    var fn = zoneMap[id];
    if (!el) return;
    el.addEventListener('click', fn);
    el.addEventListener('touchstart', function(e){ e.preventDefault(); fn(e); }, { passive: false });
  });

  var btnPagal = document.getElementById('btn-pagal');
  if (btnPagal) {
    btnPagal.addEventListener('click', triggerPagal);
    btnPagal.addEventListener('touchstart', function(e){ e.preventDefault(); triggerPagal(); }, { passive: false });
  }

  // ─── MIC / VOICE REPLAY ────────────────────────────────────
  var recorder     = null;
  var audioChunks  = [];
  var isRecording  = false;
  var recordedBlob = null;
  var player       = new Audio();

  var btnMic    = document.getElementById('btn-mic');
  var micStatus = document.getElementById('mic-status');

  function setMicLabel(txt) {
    var l = btnMic && btnMic.querySelector('.btn-label');
    if (l) l.textContent = txt;
  }
  function setMicIcon(ico) {
    var i = btnMic && btnMic.querySelector('.btn-icon');
    if (i) i.textContent = ico;
  }

  function toggleMic() {
    if (isRecording)       { stopRec();  }
    else if (recordedBlob) { playRec();  }
    else                   { startRec(); }
  }

  function startRec() {
    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(function(stream){
        audioChunks = [];
        recorder    = new MediaRecorder(stream);
        recorder.ondataavailable = function(e){ audioChunks.push(e.data); };
        recorder.onstop = function(){
          recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
          stream.getTracks().forEach(function(t){ t.stop(); });
          isRecording = false;
          if (micStatus) micStatus.classList.add('hidden');
          if (btnMic)    btnMic.classList.remove('recording');
          setMicLabel('Play voice!'); setMicIcon('▶️');
          bubble('🎤 Tap again to hear yourself!', 2200);
        };
        recorder.start();
        isRecording = true;
        if (micStatus) micStatus.classList.remove('hidden');
        if (btnMic)    btnMic.classList.add('recording');
        setMicLabel('Stop!'); setMicIcon('⏹️');
        bubble('🎤 Recording… tap to stop!', 99999);
        setTimeout(function(){ if (isRecording) stopRec(); }, 8000);
      })
      .catch(function(err){
        bubble('⚠️ Allow mic access in your browser!', 3200);
        console.warn('Mic error:', err);
      });
  }

  function stopRec() {
    if (recorder && recorder.state !== 'inactive') recorder.stop();
  }

  function playRec() {
    if (!recordedBlob) return;
    var url   = URL.createObjectURL(recordedBlob);
    player.src = url;
    player.play().catch(function(){});
    bubble("🔊 That's YOUR voice! 😂", 3200);
    playAnim('headBounce');
    player.onended = function(){
      URL.revokeObjectURL(url);
      recordedBlob = null;
      setMicLabel('Talk to me!'); setMicIcon('🎙️');
      bubble('😄 Talk to me again!', 1800);
    };
  }

  if (btnMic) {
    btnMic.addEventListener('click', toggleMic);
    btnMic.addEventListener('touchstart', function(e){ e.preventDefault(); toggleMic(); }, { passive: false });
  }

  // ─── GREETING ON LOAD ──────────────────────────────────────
  window.addEventListener('DOMContentLoaded', function(){
    setTimeout(function(){
      bubble('Kese ho Papa! 👋', 2400);
      playAnim('headBounce');
      fireEmoji('👋', window.innerWidth / 2, window.innerHeight * 0.28);
      setTimeout(function(){ safeSpeak('kese ho papa'); }, 400);
    }, 900);
  });
  </script>
</body>
</html>
